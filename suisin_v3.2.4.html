<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水深測っ太郎 v3.2.4 by Popolo App.com</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f4f8; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .app-header { background: #3498db; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        
        /* UIパネルの出し入れ用設定 */
        .ui-panel { background: white; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; flex-shrink: 0; transition: margin-top 0.3s ease; }
        .ui-panel.hidden { margin-top: -420px; } 

        .datetime-panel { background: #ebf5fb; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #aed6f1; }
        .datetime-row { display: flex; gap: 6px; align-items: center; }
        #target-datetime { flex: 1; padding: 10px; border: 1px solid #3498db; border-radius: 6px; font-size: 0.9rem; }
        
        .type-selector { display: flex; gap: 5px; margin-bottom: 8px; }
        .type-btn { flex: 1; padding: 10px; border: 2px solid #3498db; background: white; color: #3498db; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .type-btn.active { background: #3498db; color: white; }

        .input-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 8px; }
        input#depth-input { width: 200px; flex: 1.5; padding: 15px 10px; border: 3px solid #3498db; border-radius: 8px; font-size: 1.6rem; font-weight: bold; }
        #comment-input { width: 100%; padding: 15px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; font-size: 1.6rem; }
        .btn-record { background: #2ecc71; color: white; flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.8rem; cursor: pointer; }

        /* ⚓ 本部船・マーク手動配置パネルスタイル */
        .honbu-panel { background: #eef7f2; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #cceadb; box-sizing: border-box; }
        .honbu-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: #1e4620; }
        .honbu-grid { display: flex; gap: 4px; margin-bottom: 4px; width: 100%; }
        .honbu-grid input { font-size: 0.95rem; padding: 8px 4px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; min-width: 0; }
        #inputBoatName { width: 20%; } 
        #inputBoatLat { width: 40%; text-align: center; }
        #inputBoatLng { width: 40%; text-align: center; }
        .honbu-buttons { display: flex; gap: 4px; width: 100%; }
        #btnSaveBoat { flex: 1; background: #28a745; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #btnDeleteBoat { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }

        .status-bar { font-size: 0.75rem; color: #666; text-align: center; margin-top: 5px; font-weight: bold; }
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        /* 凡例のスタイル */
        .depth-legend { position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.9); padding: 8px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 10; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .legend-content.minimized { display: none; }
        .legend-item { display: flex; align-items: center; margin-bottom: 3px; }
        .color-box { width: 12px; height: 12px; margin-right: 6px; border: 1px solid #333; border-radius: 2px; }

        /* 全画面・戻すボタン */
        .view-toggle-btn { position: absolute; top: 10px; left: 10px; width: 44px; height: 44px; background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; z-index: 2000; cursor: pointer; font-size: 20px; border: none; }

        .gps-button { position: absolute; bottom: 20px; right: 10px; width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; z-index: 10; cursor: pointer; font-size: 24px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; font-weight: bold; color: #3498db; }

        /* コース消去ボタンのスタイル */
        .clear-course-button { position: absolute; bottom: 80px; right: 10px; width: 50px; height: 50px; background: #e74c3c; color: white; border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 10; cursor: pointer; font-size: 13px; border: none; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.3); line-height: 1.2; text-align: center; }
    </style>
</head>
<body>

<div id="loading">📡 通信中...</div>
<div class="app-header">水深測っ太郎 v3.2.4 by Popolo App.com</div>

<div class="ui-panel" id="ui-panel">
    <div class="datetime-panel">
        <div class="datetime-row">
            <input type="datetime-local" id="target-datetime" onchange="calculateTideAndRefresh()">
            <button onclick="setNow()" style="padding: 10px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 0.8rem;">現在</button>
        </div>
        <div id="status-display" class="status-bar">⏳ 起動中...</div>
    </div>

    <div class="type-selector">
        <button class="type-btn active" onclick="selectType('平地', this)">平地</button>
        <button class="type-btn" onclick="selectType('岩大', this)">岩大</button> 
        <button class="type-btn" onclick="selectType('岩', this)">岩</button>
        <button class="type-btn" onclick="selectType('杭', this)">杭</button>
    </div>

    <div class="input-row">
        <input type="text" id="depth-input" placeholder="今測った水深(cm)">
        <button class="btn-record" onclick="recordAtCurrentLocation()">記録</button>
        <button onclick="openModal('admin-modal')" style="width:40px; height:45px; border-radius:6px; border:none; background:#95a5a6; color:white;">🔑</button>
    </div>
    <input type="text" id="comment-input" placeholder="一言コメント（任意）">

    <!-- ⚓ 本部船・マーク手動配置パネル -->
    <div class="honbu-panel">
        <div class="honbu-title">⚓ 本部船・マーク配置 / 編集</div>
        <div class="honbu-grid">
            <input type="text" id="inputBoatName" placeholder="船名" value="本部船">
            <input type="number" id="inputBoatLat" step="any" placeholder="緯度 (Lat)">
            <input type="number" id="inputBoatLng" step="any" placeholder="経度 (Lng)">
        </div>
        <div class="honbu-buttons">
            <button id="btnSaveBoat" onclick="handleSaveBoat()">🗺️ 配置 / 更新</button>
            <button id="btnDeleteBoat" onclick="handleDeleteBoat()">削除</button>
        </div>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>
    
    <button class="view-toggle-btn" onclick="toggleUIPanel()" id="toggle-icon">🔭</button>

    <div class="depth-legend" onclick="toggleLegend()">
        <div id="legend-header">📊 凡例 (タップで開閉)</div>
        <div class="legend-content" id="legend-content">
            <div class="legend-item"><div class="color-box" style="background:#ff0000;"></div>20cm未満 (赤)</div>
            <div class="legend-item"><div class="color-box" style="background:#ffa500;"></div>20-40cm (橙)</div>
            <div class="legend-item"><div class="color-box" style="background:#ffff00;"></div>40-60cm (黄)</div>
            <div class="legend-item"><div class="color-box" style="background:#adff2f;"></div>60-80cm (黄緑)</div>
            <div class="legend-item"><div class="color-box" style="background:#76d7d2;"></div>80-100cm (淡い水色緑)</div>
            <div class="legend-item"><div class="color-box" style="background:#00ffff;"></div>100-120cm (水色)</div>
            <div class="legend-item"><div class="color-box" style="background:#70a1ff;"></div>120-140cm</div>
            <div class="legend-item"><div class="color-box" style="background:#a29bfe;"></div>140-160cm</div>
            <div class="legend-item"><div class="color-box" style="background:#000080;"></div>160cm以上</div>
        </div>
    </div>

    <button class="gps-button" onclick="updateMyLocation(true)">📍</button>
    <button id="clear-course-btn" class="clear-course-button" onclick="clearSharedCourse()">コース<br>消去</button>
</div>

<div id="admin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:12px; width:80%;">
        <h3>管理者設定</h3>
        <input type="password" id="pass-input" placeholder="パスワード" style="width:100%; padding:10px; box-sizing:border-box;">
        <button class="btn-record" onclick="saveAdminPass()" style="width:100%; margin-top:10px;">保存</button>
        <button onclick="closeModal('admin-modal')" style="width:100%; margin-top:10px; background:none; border:none;">閉じる</button>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAHhxSJK-IhYiT9XBRwE1MX7DHhghBQQQk&callback=initMap" async defer></script>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzU6Q-P1C14OfIpmoNO3I3K0TKye2JzCIIidGcD0HyJ_ZquFTBl_Db_RwHMrIT-Dbh0AQ/exec"; 
    let map, markers = [], allPointsData = [], currentSelectedTide = 0, adminPass = localStorage.getItem('popolo_pass') || "";
    let fullTideMasterData = [];
    let myLocationMarker = null;
    let selectedType = "平地";

    // コース連携用変数
    let sharedCoursePolylines = [];
    let sharedCourseMarkers = [];

    // 手動配置マーク管理用配列 (複数保持のために配列化)
    let customBoatsList = [];
    let selectedBoatId = null; // 現在編集選択中のマーク識別用

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function selectType(type, btn) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleUIPanel() {
        const panel = document.getElementById('ui-panel');
        const icon = document.getElementById('toggle-icon');
        panel.classList.toggle('hidden');
        icon.innerText = panel.classList.contains('hidden') ? '📥' : '🔭';
    }

    function toggleLegend() {
        const content = document.getElementById('legend-content');
        content.classList.toggle('minimized');
    }

    async function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 19, 
            center: { lat: 26.3318, lng: 127.9288 }, 
            mapTypeId: 'roadmap', 
            disableDefaultUI: true,  
            zoomControl: false,      
            scaleControl: true       
        });
        
        setNow();
        await syncData();
        updateMyLocation(true);
        navigator.geolocation.watchPosition(updateMyLocation, null, {enableHighAccuracy: true});

        checkUrlCourseParams();
    }

    function updateMyLocation(panTo = false) {
        navigator.geolocation.getCurrentPosition((pos) => {
            const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            if (!myLocationMarker) {
                myLocationMarker = new google.maps.Marker({
                    position: latLng, map: map,
                    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#4285F4', fillOpacity: 1, scale: 8, strokeColor: 'white', strokeWeight: 2 },
                    title: "現在地", zIndex: 999
                });
            } else {
                myLocationMarker.setPosition(latLng);
            }
            if (panTo === true) map.panTo(latLng);
        }, (err) => console.log("位置情報取得失敗"), {enableHighAccuracy: true});
    }

    async function syncData() {
        showLoading(true);
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            fullTideMasterData = data.allTideData || [];
            allPointsData = data.points || [];
            calculateTideAndRefresh();
        } catch (e) { document.getElementById('status-display').textContent = "❌ 通信失敗"; }
        showLoading(false);
    }

    function calculateTideAndRefresh() {
        const val = document.getElementById('target-datetime').value;
        if (!val || fullTideMasterData.length === 0) return;
        const s = new Date(val);
        const y = s.getFullYear(), m = s.getMonth() + 1, d = s.getDate(), h = s.getHours(), min = s.getMinutes();
        const row = fullTideMasterData.find(r => {
            const rd = new Date(r[0]);
            return rd.getFullYear() === y && (rd.getMonth()+1) === m && rd.getDate() === d;
        });
        if (row) {
            const t1 = parseFloat(row[1+h]), t2 = (h<23)?parseFloat(row[1+h+1]):t1;
            currentSelectedTide = t1 + (t2-t1)*(min/60);
            document.getElementById('status-display').textContent = `潮位(${d}日 ${h}時): ${currentSelectedTide.toFixed(1)}cm`;
        }
        refreshMarkersOnMap();
    }

    function refreshMarkersOnMap() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        allPointsData.forEach(p => {
            const baseDepth = parseFloat(p[4]) || 0;
            const simDepth = baseDepth + currentSelectedTide;
            createMarker({id:p[0], lat:p[1], lng:p[2], baseDepth:baseDepth, simDepth:simDepth, type:p[6], comment:p[7] || ""});
        });
    }

    function createMarker(d) {
        let sym = google.maps.SymbolPath.CIRCLE;
        let currentScale = 3.5;

        const isBigRock = (d.type === "岩大" || d.type === "大きい岩" || d.type === "大岩");
        const isRock = (d.type === "岩");
        const isPost = (d.type === "杭");

        if (isBigRock) {
            sym = "M 0,-1.1 L 1.2,1 L -1.2,1 Z"; 
            currentScale = 12; 
        } else if (isRock) {
            sym = "M 0,-1.1 L 1.2,1 L -1.2,1 Z"; 
            currentScale = 7; 
        } else if (isPost) {
            sym = "M 0,-1.2 L 1,0 L 0,1.2 L -1,0 Z"; 
            currentScale = 7;
        }

        const marker = new google.maps.Marker({
            position: {lat: Number(d.lat), lng: Number(d.lng)}, 
            map: map,
            icon: { 
                path: sym, 
                fillColor: getDepthColor(d.simDepth), 
                fillOpacity: 0.9, 
                scale: currentScale, 
                strokeColor: "#333", 
                strokeWeight: 1.5 
            }
        });

        const info = new google.maps.InfoWindow({
            content: `
                <div style="font-size:24px; width:280px; padding:10px; line-height:1.4;">
                    <select id="edit-type-${d.id}" style="font-size:24px; font-weight:bold; margin-bottom:10px; width:100%; padding:5px; border:2px solid #3498db; border-radius:8px;">
                        <option value="平地" ${(!isBigRock && !isRock && !isPost) ? 'selected' : ''}>平地</option>
                        <option value="岩" ${isRock ? 'selected' : ''}>岩</option>
                        <option value="岩大" ${isBigRock ? 'selected' : ''}>岩大</option>
                        <option value="杭" ${isPost ? 'selected' : ''}>杭</option>
                    </select>
                    <br>
                    水深(cm): 
                    <input type="number" id="edit-depth-${d.id}" value="${d.simDepth.toFixed(1)}" 
                           style="width:120px; font-size:24px; font-weight:bold; border:2px solid #3498db; border-radius:8px; padding:5px; text-align:center;">
                    <br>
                    <input type="text" id="edit-cmt-${d.id}" value="${d.comment}" 
                           style="width:100%; margin-top:15px; font-size:20px; padding:10px; border:2px solid #ccc; border-radius:8px; box-sizing:border-box;" 
                           placeholder="コメント編集">
                    
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button onclick="updatePoint('${d.id}')" 
                                style="flex:1; background:#3498db; color:white; border:none; padding:15px; border-radius:8px; font-size:20px; font-weight:bold; cursor:pointer;">
                            保存
                        </button>
                        <button onclick="deletePoint('${d.id}')" 
                                style="flex:1; background:white; border:2px solid red; color:red; padding:15px; border-radius:8px; font-size:20px; font-weight:bold; cursor:pointer;">
                            削除
                        </button>
                    </div>
                </div>`
        });

        marker.addListener("click", () => info.open(map, marker));
        markers.push(marker);
    }

    function getDepthColor(b) {
        if (b < 20) return "#ff0000";    
        if (b < 40) return "#ffa500";    
        if (b < 60) return "#ffff00";    
        if (b < 80) return "#adff2f";    
        if (b < 100) return "#76d7d2";   
        if (b < 120) return "#00ffff";   
        if (b < 140) return "#70a1ff";
        if (b < 160) return "#a29bfe";
        return "#000080";                
    }

    function setNow() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('target-datetime').value = now.toISOString().slice(0, 16);
        if (fullTideMasterData.length > 0) calculateTideAndRefresh();
    }

    function recordAtCurrentLocation() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const latLng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            promptAndSave(latLng);
        }, (err) => alert("位置情報エラー"), {enableHighAccuracy: true});
    }

    async function promptAndSave(latLng) {
        const raw = document.getElementById('depth-input').value;
        const comment = document.getElementById('comment-input').value;
        if (!raw) return alert("水深を入力してください");
        const baseDepth = parseFloat(raw) - currentSelectedTide;
        const pointData = { method: 'POST', password: adminPass, id: String(Date.now()), lat: latLng.lat(), lng: latLng.lng(), rawDepth: raw, baseDepth: baseDepth, timestamp: document.getElementById('target-datetime').value, type: selectedType, comment: comment };
        showLoading(true);
        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(pointData) });
            if ((await res.text()).trim() === "success") { await syncData(); document.getElementById('depth-input').value = ""; document.getElementById('comment-input').value = ""; }
        } catch (e) {}
        showLoading(false);
    }

    async function updatePoint(id) {
        const newDepth = document.getElementById(`edit-depth-${id}`).value;
        const newCmt = document.getElementById(`edit-cmt-${id}`).value;
        const newType = document.getElementById(`edit-type-${id}`).value; 

        if (!newDepth) return alert("水深を入力してください");
        const newBaseDepth = parseFloat(newDepth) - currentSelectedTide;
        
        showLoading(true);
        try {
            const response = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    method: 'UPDATE_POINT', 
                    password: adminPass, 
                    id: id, 
                    rawDepth: newDepth, 
                    baseDepth: newBaseDepth, 
                    comment: newCmt,
                    type: newType 
                }) 
            });
            if ((await response.text()).trim() === "success") { 
                await syncData(); 
                alert("更新しました！"); 
            }
        } catch (e) { alert("通信エラーが発生しました"); }
        showLoading(false);
    }

    async function deletePoint(id) {
        if (!confirm("削除しますか？")) return;
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ method: 'DELETE', password: adminPass, id: id }) });
            await syncData();
        } catch (e) {}
        showLoading(false);
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function saveAdminPass() {
        adminPass = document.getElementById('pass-input').value.trim();
        localStorage.setItem('popolo_pass', adminPass);
        closeModal('admin-modal');
        syncData();
    }

    function getContrastColor(hexColor) {
        if (!hexColor || hexColor.length < 7) return '#ffffff';
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 170) ? '#000000' : '#ffffff';
    }

    function checkUrlCourseParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseDataParam = urlParams.get('course_data');
        if (!courseDataParam) return;

        try {
            const decodedData = decodeURIComponent(courseDataParam);
            const courseObj = JSON.parse(decodedData);

            if (!courseObj.path || courseObj.path.length === 0) return;

            const pathCoords = [];
            const bounds = new google.maps.LatLngBounds();

            courseObj.path.forEach(pt => {
                const pos = { lat: Number(pt.lat), lng: Number(pt.lng) };
                pathCoords.push(pos);
                bounds.extend(pos);

                const defaultColors = { A:'#ff3b30', B:'#0000ff', C:'#ffff00', D:'#28a745', E:'#6a1b9a', F:'#ff2d55', G:'#000080', S:'#0000ff', K:'#5ac8fa' };
                const mColor = pt.color || defaultColors[pt.label] || '#333333';

                const labelTextColor = getContrastColor(mColor);

                const circle = new google.maps.Circle({
                    map: map,
                    center: pos,
                    radius: (pt.label === 'A' ? 12 : 9),
                    strokeColor: mColor,
                    strokeOpacity: 1,
                    strokeWeight: 2,
                    fillColor: mColor,
                    fillOpacity: 0.6,
                    zIndex: 500
                });
                sharedCourseMarkers.push(circle);

                const labelMarker = new google.maps.Marker({
                    position: pos,
                    map: map,
                    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 },
                    label: {
                        text: pt.label,
                        color: labelTextColor,
                        fontWeight: "bold",
                        fontSize: "12px"
                    },
                    zIndex: 501
                });
                sharedCourseMarkers.push(labelMarker);
            });

            const poly = new google.maps.Polyline({
                path: pathCoords,
                strokeColor: '#e74c3c',
                strokeOpacity: 0.8,
                strokeWeight: 3,
                map: map,
                zIndex: 499
            });
            sharedCoursePolylines.push(poly);

            document.getElementById('clear-course-btn').style.display = 'flex';
            map.fitBounds(bounds);
            document.getElementById('status-display').textContent = `🚩 コース表示中: ${courseObj.name}`;

        } catch (e) {
            console.error("コースデータの読み込みに失敗しました", e);
        }
    }

    function clearSharedCourse() {
        sharedCoursePolylines.forEach(p => p.setMap(null));
        sharedCourseMarkers.forEach(m => m.setMap(null));
        sharedCoursePolylines = [];
        sharedCourseMarkers = [];
        document.getElementById('clear-course-btn').style.display = 'none';
        calculateTideAndRefresh(); 
    }

    // ⚓ 本部船・マーク手動配置・編集ロジック (複数対応版)
    function handleSaveBoat() {
        const name = document.getElementById('inputBoatName').value || '本部船';
        const lat = parseFloat(document.getElementById('inputBoatLat').value);
        const lng = parseFloat(document.getElementById('inputBoatLng').value);

        if (isNaN(lat) || !lat || isNaN(lng) || !lng) {
            alert("緯度と経度を正しく入力してください。");
            return;
        }

        const pos = { lat: lat, lng: lng };

        // 既存マークの個別編集(上書き)判定
        if (selectedBoatId !== null) {
            const targetBoat = customBoatsList.find(b => b.id === selectedBoatId);
            if (targetBoat) {
                targetBoat.marker.setPosition(pos);
                targetBoat.marker.setTitle(name);
                targetBoat.marker.setLabel({ text: name, color: '#000000', fontWeight: 'bold', fontSize: '13px' });
                if (targetBoat.circle) {
                    targetBoat.circle.setCenter(pos);
                }
                map.panTo(pos);
                // 選択をクリア
                selectedBoatId = null;
                document.getElementById('inputBoatLat').value = '';
                document.getElementById('inputBoatLng').value = '';
                return;
            }
        }

        // 新規マークとして追加生成するロジック
        const newId = Date.now();
        
        const marker = new google.maps.Marker({
            position: pos,
            map: map,
            title: name,
            label: { text: name, color: '#000000', fontWeight: 'bold', fontSize: '13px' },
            icon: {
                path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
                scale: 6,
                fillColor: '#0055ff',
                fillOpacity: 1,
                strokeColor: '#ffffff',
                strokeWeight: 2
            },
            zIndex: 800
        });

        const circle = new google.maps.Circle({
            map: map,
            center: pos,
            radius: 100, 
            strokeColor: '#0055ff',
            strokeOpacity: 0.6,
            strokeWeight: 2,
            fillColor: '#0055ff',
            fillOpacity: 0.12,
            clickable: false
        });

        // タップして再編集または削除対象に指定できるようにする
        marker.addListener('click', () => {
            selectedBoatId = newId;
            document.getElementById('inputBoatName').value = marker.getTitle();
            document.getElementById('inputBoatLat').value = marker.getPosition().lat().toFixed(6);
            document.getElementById('inputBoatLng').value = marker.getPosition().lng().toFixed(6);
        });

        customBoatsList.push({ id: newId, marker: marker, circle: circle });
        map.panTo(pos);

        // 入力の緯度経度のみリセット
        document.getElementById('inputBoatLat').value = '';
        document.getElementById('inputBoatLng').value = '';
    }

    // ⚓ 本部船・マーク個別削除ロジック
    function handleDeleteBoat() {
        if (selectedBoatId !== null) {
            const index = customBoatsList.findIndex(b => b.id === selectedBoatId);
            if (index !== -1) {
                customBoatsList[index].marker.setMap(null);
                if (customBoatsList[index].circle) {
                    customBoatsList[index].circle.setMap(null);
                }
                customBoatsList.splice(index, 1);
                
                selectedBoatId = null;
                document.getElementById('inputBoatLat').value = '';
                document.getElementById('inputBoatLng').value = '';
                alert("選択したマークを削除しました。");
                return;
            }
        }
        alert("削除するマークが選択されていません。\nマップ上のマークをタップしてから削除してください。");
    }
</script>
